quarkus.http.port=9090

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:archangel
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

archangel.rss.url=https://archlinux.org/feeds/news/


quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=2000

logic-api/mp-rest/scope=jakarta.enterprise.context.ApplicationScoped
logic-api/mp-rest/url=http://localhost:8000
logic-api/mp-rest/connectTimeout=2000
logic-api/mp-rest/readTimeout=5000